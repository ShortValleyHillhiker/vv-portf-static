    function layout(n, t) { const e = Math.max(0, Math.min(1, (n - 480) / 544)), r = Math.max(Math.round(12 + 4 * e), Math.ceil(Math.sqrt(n * t / 8400))); return { cell: r, cols: Math.ceil(n / r), rows: Math.ceil(t / r) } } const W = "'use strict';\nconst BOOST=122,DECAY=0.75,MIN=4,FADE=2400,MAX_R=20,SKIP=2,LN=64;\nlet cell=16,mR=0,rW=0,rV=0,lS=0,ox=0,oy=0,cols=0,rows=0,cv,cx;\nlet lum=null,shp=null,cX=null,cY=null,src=null,ft=-Infinity,lt=0,dirty=true,rdy=false;\n\nconst LUT=new Float32Array(2*LN+1);\nfor(let i=0;i<=2*LN;i++){const t=(i-LN)/LN*2,v=Math.abs(t)<1e-6?1:Math.sin(Math.PI*t)/(Math.PI*t);LUT[i]=v<0?v*3:v;}\nlet _r=1831565813;\nconst rand=()=>{_r^=_r<<13;_r^=_r>>17;_r^=_r<<5;return(_r>>>0)*2.3283064365386963e-10};\n\n// ripple stride: x y r age str inner2 outer2\nconst RS=7,rb=new Float32Array(MAX_R*RS);let rC=0;\nconst N=320*220,tB=new Float32Array(N*3),hB=new Float32Array(N*3),sB=new Float32Array(N*3);\nlet tN=0,hN=0,sN=0;\n\nself.onmessage=({data:d})=>{\n  if(d.type==='init'){cv=d.canvas;cx=cv.getContext('2d');setup(d);}\n  if(d.type==='resize'){setup(d);dirty=true;rdy=true;}\n  if(d.type==='tick'){const dt=Math.min((d.ts-lt)*.001,.15);lt=d.ts;tick(d.ts,dt);}\n  if(d.type==='ripple'){bump(d.x,d.y);dirty=true;}\n  if(d.type==='image'){src=d.bitmap;bake();ft=performance.now();dirty=true;}\n};\n\nfunction setup(d){\n  cell=d.cell;cols=d.cols;rows=d.rows;\n  mR=cell*.525;rW=55*cell/16;rV=333*cell/16;lS=LN/rW;\n  cv.width=d.width;cv.height=d.height;\n  ox=(cols*cell-d.width)/2;oy=(rows*cell-d.height)/2;\n  const n=cols*rows,h=cell*.5;\n  cX=new Float32Array(n);cY=new Float32Array(n);\n  for(let r=0;r<rows;r++){const b=r*cols,y=r*cell+h-oy;for(let c=0;c<cols;c++){cX[b+c]=c*cell+h-ox;cY[b+c]=y;}}\n  if(src)bake();\n}\n\nfunction bake(){\n  const o=new OffscreenCanvas(cols,rows),oc=o.getContext('2d');\n  const sc=Math.max(cols/src.width,rows/src.height),dw=src.width*sc,dh=src.height*sc;\n  oc.fillStyle='#f4f4f4';oc.fillRect(0,0,cols,rows);\n  oc.drawImage(src,(cols-dw)*.5,(rows-dh)*.5,dw,dh);\n  const px=oc.getImageData(0,0,cols,rows).data,n=cols*rows;\n  lum=new Float32Array(n);shp=new Uint8Array(n);\n  for(let i=0;i<n;i++){const p=i<<2,l=.21*px[p]+.72*px[p+1]+.07*px[p+2];lum[i]=l;shp[i]=l<120?0:l<170?1:2;}\n}\n\nfunction bump(x,y){\n  if(rC>=MAX_R){rb.copyWithin(0,RS,rC*RS);rC--;}\n  const b=rC++*RS;rb[b]=x;rb[b+1]=y;rb[b+2]=0;rb[b+3]=0;rb[b+4]=BOOST;\n}\n\nfunction push(i,boost,fade){\n  let l=lum[i]*fade+boost;if(l<SKIP)return;if(l>255)l=255;\n  const r=mR*l*(1/255);if(r<.15)return;\n  const s=(boost>0&&rand()<boost*.025)?(rand()*3)|0:shp[i],x=cX[i],y=cY[i];\n  if(s===0){tB[tN++]=x;tB[tN++]=y;tB[tN++]=r;}\n  else if(s===1){hB[hN++]=x;hB[hN++]=y;hB[hN++]=r;}\n  else{sB[sN++]=x;sB[sN++]=y;sB[sN++]=r;}\n}\n\nfunction flush(){\n  cx.beginPath();\n  for(let i=0;i<tN;i+=3){const x=tB[i],y=tB[i+1],r=tB[i+2];cx.moveTo(x,y-r);cx.lineTo(x+r*.866,y+r*.5);cx.lineTo(x-r*.866,y+r*.5);cx.closePath();}\n  cx.fill();\n  cx.beginPath();\n  for(let i=0;i<hN;i+=3){const x=hB[i],y=hB[i+1],r=hB[i+2],h=r*.5,s=r*.866;cx.moveTo(x+r,y);cx.lineTo(x+h,y+s);cx.lineTo(x-h,y+s);cx.lineTo(x-r,y);cx.lineTo(x-h,y-s);cx.lineTo(x+h,y-s);cx.closePath();}\n  cx.fill();\n  cx.beginPath();\n  for(let i=0;i<sN;i+=3){const x=sB[i],y=sB[i+1],s=sB[i+2]*.88;cx.rect(x-s,y-s,s*2,s*2);}\n  cx.fill();\n}\n\nfunction tick(ts,dt){\n  if(!lum)return;\n  let w=0;\n  for(let i=0;i<rC;i++){\n    const b=i*RS,age=rb[b+3]+dt,str=BOOST*Math.exp(-age/DECAY);\n    if(str<MIN)continue;\n    const r=rb[b+2]+rV*dt,x=rb[b],y=rb[b+1],out=r+rW,inn=r-rW,wb=w*RS;\n    rb[wb]=x;rb[wb+1]=y;rb[wb+2]=r;rb[wb+3]=age;rb[wb+4]=str;\n    rb[wb+5]=inn>0?inn*inn:0;rb[wb+6]=out*out;w++;\n  }\n  rC=w;\n  const fade=Math.min(1,(ts-ft)/FADE);\n  dirty=rC>0||fade<1;\n  if(!dirty){if(rdy){rdy=false;self.postMessage({type:'ready'});}return;}\n  cx.fillStyle='#f4f4f4';cx.fillRect(0,0,cv.width,cv.height);cx.fillStyle='#2500c9';\n  tN=hN=sN=0;\n  for(let i=0,n=cols*rows;i<n;i++){\n    let boost=0;\n    if(rC>0) for(let ri=0;ri<rC;ri++){\n      const b=ri*RS,dx=cX[i]-rb[b],dy=cY[i]-rb[b+1],d2=dx*dx+dy*dy;\n      if(d2<rb[b+5]||d2>rb[b+6])continue;\n      const li=((Math.sqrt(d2)-rb[b+2])*lS+LN)|0;\n      if(li>=0&&li<=2*LN)boost+=rb[b+4]*LUT[li];\n    }\n    push(i,boost,fade);\n  }\n  flush();\n  if(rdy){rdy=false;self.postMessage({type:'ready'});}\n}\n", DIST2 = 196, DELAY = 120, FMS = 1e3 / 12, cv = document.getElementById("out"), L = layout(window.innerWidth, window.innerHeight); cv.width = window.innerWidth, cv.height = window.innerHeight; const off = cv.transferControlToOffscreen(), wk = new Worker(URL.createObjectURL(new Blob([W], { type: "application/javascript" }))); function loadImg() { const { cols: n, rows: t } = layout(window.innerWidth, window.innerHeight), e = new Image; e.crossOrigin = "anonymous", e.onload = () => createImageBitmap(e).then((n => wk.postMessage({ type: "image", bitmap: n }, [n]))), e.src = `https://picsum.photos/seed/${Math.floor(1e3 * Math.random())}/${Math.max(6 * n, 400)}/${Math.max(6 * t, 300)}` } wk.onmessage = n => { "ready" === n.data.type && (cv.style.opacity = "1") }, wk.postMessage({ type: "init", canvas: off, width: window.innerWidth, height: window.innerHeight, ...L }, [off]), loadImg(); let ev = 5, ec = 0, ef = 0, es = null; !function n(t) { requestAnimationFrame(n), ef <= 10 && (ef || (es = t), 10 === ef && (ev = Math.max(1, Math.round(10 * FMS / (t - es))), ec = 0), ef++), ++ec % ev == 0 && wk.postMessage({ type: "tick", ts: t }) }(0); let rt = null; window.addEventListener("resize", (() => { cv.style.opacity = "0", clearTimeout(rt), rt = setTimeout((() => { const n = layout(window.innerWidth, window.innerHeight); wk.postMessage({ type: "resize", width: window.innerWidth, height: window.innerHeight, ...n }) }), 300) })); let drag = !1, lx = 0, ly = 0, lt2 = -1 / 0; window.addEventListener("pointerdown", (n => { drag = !0, lx = n.clientX, ly = n.clientY; const t = performance.now(); t - lt2 < 120 || (lt2 = t, wk.postMes
