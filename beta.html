<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Grid</title>
  <style>
    *, *::before, *::after {margin: 0; padding: 0; box-sizing: border-box;}
    html, body {width: 100%; height: 100%; background: #f4f4f4; overflow: hidden; touch-action: none;}
    canvas {position: fixed; inset: 0; display: block;opacity: 1;}
  </style>
</head>
<body>
  <canvas id="out"></canvas>
<script>
const SPAWN_DIST2 = 14 * 14;
const CLICK_DELAY = 120;
const TARGET_FPS  = 12;
const FRAME_MS    = 1000 / TARGET_FPS;

function computeCell(w, h) {
  const t      = Math.max(0, Math.min(1, (w - 480) / (1024 - 480)));
  const base   = Math.round(12 + t * 4);
  const budget = Math.ceil(Math.sqrt(w * h / 8400));
  return Math.max(base, budget);
}
function getLayout(w, h) {
  const cell = computeCell(w, h);
  return { cell, cols: Math.ceil(w / cell), rows: Math.ceil(h / cell) };
}

const WORKER_SRC = `'use strict';

let cell=16, maxDotR=0, ringWidth=0, ringSpeed=0, lutScale=0, offsetX=0, offsetY=0;

const RING_BOOST=122, RING_FALLOFF=0.75, RING_MIN_STR=4, FADE_MS=2400,
      MAX_RIPPLES=20, LUM_SKIP=2, TAU=Math.PI*2, LUT_N=64;

const SINC_SCALE=2, NEG_BOOST=3;
const falloffLUT=new Float32Array(2*LUT_N+1);
for(let i=0;i<=2*LUT_N;i++){
  const t=(i-LUT_N)/LUT_N*SINC_SCALE;
  const v=(Math.abs(t)<1e-6)?1.0:Math.sin(Math.PI*t)/(Math.PI*t);
  falloffLUT[i]=v<0?v*NEG_BOOST:v;
}

let _rng=1831565813;
function rand(){_rng^=_rng<<13;_rng^=_rng>>17;_rng^=_rng<<5;return(_rng>>>0)*2.3283064365386963e-10;}

const MAX_CELLS=320*220;
const triBuf=new Float32Array(MAX_CELLS*3);
const cirBuf=new Float32Array(MAX_CELLS*3);
const sqrBuf=new Float32Array(MAX_CELLS*3);
const boostBuf=new Float32Array(MAX_CELLS);

const RIPPLE_STRIDE=11;
const rippleBuf=new Float32Array(MAX_RIPPLES*RIPPLE_STRIDE);
const rp_x=new Float32Array(MAX_RIPPLES), rp_y=new Float32Array(MAX_RIPPLES),
      rp_r=new Float32Array(MAX_RIPPLES), rp_str=new Float32Array(MAX_RIPPLES),
      rp_inner2=new Float32Array(MAX_RIPPLES), rp_outer2=new Float32Array(MAX_RIPPLES),
      rp_minC=new Int32Array(MAX_RIPPLES), rp_maxC=new Int32Array(MAX_RIPPLES),
      rp_minR=new Int32Array(MAX_RIPPLES), rp_maxR=new Int32Array(MAX_RIPPLES);
let rippleCount=0;

let canvas,ctx,cols=0,rows=0;
let cachedLum=null,cachedShape=null,cachedCX=null,cachedCY=null;
let currentImg=null,fadeStart=-Infinity,lastTs=0;
let baseCanvas=null,baseValid=false,buildingBase=false;
let dirty=true;
let postReadyAfterRender=false; /* signals render() to send 'ready' to main thread */

self.onmessage=function(e){
  const d=e.data;
  if(d.type==='init')  { canvas=d.canvas; ctx=canvas.getContext('2d'); applyResize(d); }
  if(d.type==='tick')  { const dt=Math.min((d.ts-lastTs)*0.001,0.15); lastTs=d.ts; render(d.ts,dt); }
  if(d.type==='resize'){ applyResize(d); baseCanvas=null; baseValid=false; buildingBase=false; dirty=true; postReadyAfterRender=true; }
  if(d.type==='ripple'){ addRipple(d.x,d.y); dirty=true; }
  if(d.type==='image') { currentImg=d.bitmap; cachePixels(); fadeStart=performance.now(); baseCanvas=null; baseValid=false; buildingBase=false; dirty=true; }
};

function applyResize(d){
  cell=d.cell; cols=d.cols; rows=d.rows;
  maxDotR=cell*0.525; ringWidth=55*cell/16; ringSpeed=333*cell/16; lutScale=LUT_N/ringWidth;
  canvas.width=d.width; canvas.height=d.height;
  offsetX=(cols*cell-d.width)/2; offsetY=(rows*cell-d.height)/2;
  buildCellCache();
  if(currentImg) cachePixels();
}

function buildCellCache(){
  const n=cols*rows, half=cell*0.5;
  cachedCX=new Float32Array(n); cachedCY=new Float32Array(n);
  for(let row=0;row<rows;row++){
    const base=row*cols, cy=row*cell+half-offsetY;
    for(let col=0;col<cols;col++){ cachedCX[base+col]=col*cell+half-offsetX; cachedCY[base+col]=cy; }
  }
}

function cachePixels(){
  const ofc=new OffscreenCanvas(cols,rows), ofCtx=ofc.getContext('2d');
  const scale=Math.max(cols/currentImg.width,rows/currentImg.height);
  const dw=currentImg.width*scale, dh=currentImg.height*scale;
  ofCtx.fillStyle='#f4f4f4'; ofCtx.fillRect(0,0,cols,rows);
  ofCtx.drawImage(currentImg,(cols-dw)*0.5,(rows-dh)*0.5,dw,dh);
  const raw=ofCtx.getImageData(0,0,cols,rows).data, n=cols*rows;
  cachedLum=new Float32Array(n); cachedShape=new Uint8Array(n);
  for(let i=0;i<n;i++){
    const p=i<<2, lum=0.21*raw[p]+0.72*raw[p+1]+0.07*raw[p+2];
    cachedLum[i]=lum; cachedShape[i]=lum<120?0:lum<170?1:2;
  }
}

function addRipple(x,y){
  if(rippleCount>=MAX_RIPPLES){ rippleBuf.copyWithin(0,RIPPLE_STRIDE,rippleCount*RIPPLE_STRIDE); rippleCount--; }
  const b=rippleCount++*RIPPLE_STRIDE;
  rippleBuf[b]=x; rippleBuf[b+1]=y; rippleBuf[b+2]=0; rippleBuf[b+3]=0; rippleBuf[b+4]=RING_BOOST;
}

function drawPasses(c,triN,cirN,sqrN){
  c.beginPath();
  for(let i=0;i<triN;i+=3){
    const cx=triBuf[i],cy=triBuf[i+1],r=triBuf[i+2];
    c.moveTo(cx,cy-r); c.lineTo(cx+r*0.866,cy+r*0.5); c.lineTo(cx-r*0.866,cy+r*0.5); c.closePath();
  }
  c.fill();
  c.beginPath();
  for(let i=0;i<cirN;i+=3){
    const cx=cirBuf[i],cy=cirBuf[i+1],r=cirBuf[i+2],rh=r*0.5,r87=r*0.866;
    c.moveTo(cx+r,cy); c.lineTo(cx+rh,cy+r87); c.lineTo(cx-rh,cy+r87);
    c.lineTo(cx-r,cy); c.lineTo(cx-rh,cy-r87); c.lineTo(cx+rh,cy-r87); c.closePath();
  }
  c.fill();
  c.beginPath();
  for(let i=0;i<sqrN;i+=3){
    const cx=sqrBuf[i],cy=sqrBuf[i+1],s=sqrBuf[i+2]*0.88; c.rect(cx-s,cy-s,s+s,s+s);
  }
  c.fill();
}

function scheduleBaseCanvas(){
  if(buildingBase||baseValid) return;
  buildingBase=true;
  setTimeout(function(){
    if(!cachedLum){ buildingBase=false; return; }
    baseCanvas=new OffscreenCanvas(canvas.width,canvas.height);
    const bCtx=baseCanvas.getContext('2d');
    bCtx.fillStyle='#f4f4f4'; bCtx.fillRect(0,0,canvas.width,canvas.height); bCtx.fillStyle='#2500c9';
    let triN=0,cirN=0,sqrN=0;
    for(let row=0;row<rows;row++){
      const rowBase=row*cols;
      for(let col=0;col<cols;col++){
        const idx=rowBase+col, lum=cachedLum[idx];
        if(lum<LUM_SKIP) continue;
        const dotR=maxDotR*lum*(1/255); if(dotR<0.15) continue;
        const shape=cachedShape[idx], cx=cachedCX[idx], cy=cachedCY[idx];
        if(shape===0){ triBuf[triN++]=cx; triBuf[triN++]=cy; triBuf[triN++]=dotR; }
        else if(shape===1){ cirBuf[cirN++]=cx; cirBuf[cirN++]=cy; cirBuf[cirN++]=dotR; }
        else{ sqrBuf[sqrN++]=cx; sqrBuf[sqrN++]=cy; sqrBuf[sqrN++]=dotR; }
      }
    }
    drawPasses(bCtx,triN,cirN,sqrN);
    baseValid=true; buildingBase=false; dirty=true;
  },0);
}

function computeBoosts(){
  boostBuf.fill(0);
  let uMinR=rows,uMaxR=-1,uMinC=cols,uMaxC=-1;
  const half=cell*0.5;
  for(let ri=0;ri<rippleCount;ri++){
    const rx=rp_x[ri],ry=rp_y[ri],rr=rp_r[ri],str=rp_str[ri];
    const inner2=rp_inner2[ri],outer2=rp_outer2[ri];
    const mnR=rp_minR[ri],mxR=rp_maxR[ri],mnC=rp_minC[ri],mxC=rp_maxC[ri];
    if(mnR<uMinR)uMinR=mnR; if(mxR>uMaxR)uMaxR=mxR;
    if(mnC<uMinC)uMinC=mnC; if(mxC>uMaxC)uMaxC=mxC;
    for(let row=mnR;row<=mxR;row++){
      const rowBase=row*cols;
      const dy=cachedCY[rowBase]-ry, dy2=dy*dy;
      if(dy2>=outer2) continue; // row misses outer circle entirely
      // clamp columns to the outer circle's chord for this row
      const outerDx=Math.sqrt(outer2-dy2);
      const cL=Math.max(mnC,Math.floor((rx-outerDx-half+offsetX)/cell));
      const cR=Math.min(mxC,Math.ceil( (rx+outerDx-half+offsetX)/cell));
      if(dy2>=inner2){
        // row doesn't cross the inner hole — single arc band
        for(let col=cL;col<=cR;col++){
          const idx=rowBase+col, dx=cachedCX[idx]-rx, d2=dx*dx+dy2;
          if(d2<inner2||d2>outer2) continue;
          const li=((Math.sqrt(d2)-rr)*lutScale+LUT_N)|0;
          if(li<0||li>2*LUT_N) continue;
          boostBuf[idx]+=str*falloffLUT[li];
        }
      } else {
        // row passes through inner hole — two arc segments, skip the gap
        const innerDx=Math.sqrt(inner2-dy2);
        const iL=Math.floor((rx-innerDx-half+offsetX)/cell);
        const iR=Math.ceil( (rx+innerDx-half+offsetX)/cell);
        for(let col=cL,end=Math.min(iL,cR);col<=end;col++){
          const idx=rowBase+col, dx=cachedCX[idx]-rx, d2=dx*dx+dy2;
          if(d2>outer2) continue;
          const li=((Math.sqrt(d2)-rr)*lutScale+LUT_N)|0;
          if(li<0||li>2*LUT_N) continue;
          boostBuf[idx]+=str*falloffLUT[li];
        }
        for(let col=Math.max(iR,cL);col<=cR;col++){
          const idx=rowBase+col, dx=cachedCX[idx]-rx, d2=dx*dx+dy2;
          if(d2>outer2) continue;
          const li=((Math.sqrt(d2)-rr)*lutScale+LUT_N)|0;
          if(li<0||li>2*LUT_N) continue;
          boostBuf[idx]+=str*falloffLUT[li];
        }
      }
    }
  }
  return [uMinR,uMaxR,uMinC,uMaxC];
}

function render(ts,dt){
  if(!cachedLum){
    if(postReadyAfterRender){ postReadyAfterRender=false; self.postMessage({type:'ready'}); }
    return;
  }
  if(!dirty&&baseValid){
    if(postReadyAfterRender){ postReadyAfterRender=false; self.postMessage({type:'ready'}); }
    return;
  }

  let write=0;
  for(let i=0;i<rippleCount;i++){
    const rb=i*RIPPLE_STRIDE, age=rippleBuf[rb+3]+dt, str=RING_BOOST*Math.exp(-age/RING_FALLOFF);
    if(str<RING_MIN_STR) continue;
    const r=rippleBuf[rb+2]+ringSpeed*dt, x=rippleBuf[rb], y=rippleBuf[rb+1];
    const out=r+ringWidth, inn=r-ringWidth, wb=write*RIPPLE_STRIDE;
    const gx=x+offsetX, gy=y+offsetY;
    rippleBuf[wb]=x; rippleBuf[wb+1]=y; rippleBuf[wb+2]=r; rippleBuf[wb+3]=age; rippleBuf[wb+4]=str;
    rippleBuf[wb+5]=inn>0?inn*inn:0; rippleBuf[wb+6]=out*out;
    rippleBuf[wb+7]=Math.max(0,Math.floor((gx-out)/cell));
    rippleBuf[wb+8]=Math.min(cols-1,Math.ceil((gx+out)/cell));
    rippleBuf[wb+9]=Math.max(0,Math.floor((gy-out)/cell));
    rippleBuf[wb+10]=Math.min(rows-1,Math.ceil((gy+out)/cell));
    rp_x[write]=x; rp_y[write]=y; rp_r[write]=r; rp_str[write]=str;
    rp_inner2[write]=rippleBuf[wb+5]; rp_outer2[write]=rippleBuf[wb+6];
    rp_minC[write]=rippleBuf[wb+7]; rp_maxC[write]=rippleBuf[wb+8];
    rp_minR[write]=rippleBuf[wb+9]; rp_maxR[write]=rippleBuf[wb+10];
    write++;
  }
  rippleCount=write;

  const fade=Math.min(1,(ts-fadeStart)/FADE_MS);
  if(fade>=1&&!baseValid&&!buildingBase) scheduleBaseCanvas();
  dirty=rippleCount>0||fade<1;

  if(baseValid){
    ctx.drawImage(baseCanvas,0,0);
    if(rippleCount>0){
      const [uMinR,uMaxR,uMinC,uMaxC]=computeBoosts();
      ctx.fillStyle='#f4f4f4';
      ctx.fillRect(uMinC*cell-offsetX,uMinR*cell-offsetY,(uMaxC-uMinC+1)*cell,(uMaxR-uMinR+1)*cell);
      ctx.fillStyle='#2500c9';
      let triN=0,cirN=0,sqrN=0;
      for(let row=uMinR;row<=uMaxR;row++){
        const rowBase=row*cols;
        for(let col=uMinC;col<=uMaxC;col++){
          const idx=rowBase+col, boost=boostBuf[idx];
          let lum=cachedLum[idx]+boost;
          if(lum<LUM_SKIP) continue; if(lum>255) lum=255;
          const dotR=maxDotR*lum*(1/255); if(dotR<0.15) continue;
          const shape=(boost>0&&rand()<boost*0.025)?(rand()*3)|0:cachedShape[idx];
          const cx=cachedCX[idx],cy=cachedCY[idx];
          if(shape===0){ triBuf[triN++]=cx; triBuf[triN++]=cy; triBuf[triN++]=dotR; }
          else if(shape===1){ cirBuf[cirN++]=cx; cirBuf[cirN++]=cy; cirBuf[cirN++]=dotR; }
          else{ sqrBuf[sqrN++]=cx; sqrBuf[sqrN++]=cy; sqrBuf[sqrN++]=dotR; }
        }
      }
      drawPasses(ctx,triN,cirN,sqrN);
    }
  } else {
    ctx.fillStyle='#f4f4f4'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#2500c9';
    if(rippleCount>0) computeBoosts();
    let triN=0,cirN=0,sqrN=0;
    for(let row=0;row<rows;row++){
      const rowBase=row*cols;
      for(let col=0;col<cols;col++){
        const idx=rowBase+col;
        const boost=rippleCount>0?boostBuf[idx]:0;
        let lum=cachedLum[idx]*fade+boost;
        if(lum<LUM_SKIP) continue; if(lum>255) lum=255;
        const dotR=maxDotR*lum*(1/255); if(dotR<0.15) continue;
        const shape=(boost>0&&rand()<boost*0.025)?(rand()*3)|0:cachedShape[idx];
        const cx=cachedCX[idx],cy=cachedCY[idx];
        if(shape===0){ triBuf[triN++]=cx; triBuf[triN++]=cy; triBuf[triN++]=dotR; }
        else if(shape===1){ cirBuf[cirN++]=cx; cirBuf[cirN++]=cy; cirBuf[cirN++]=dotR; }
        else{ sqrBuf[sqrN++]=cx; sqrBuf[sqrN++]=cy; sqrBuf[sqrN++]=dotR; }
      }
    }
    drawPasses(ctx,triN,cirN,sqrN);
  }

  /* Notify main thread that a frame is ready — used to trigger fade-in after resize */
  if(postReadyAfterRender){ postReadyAfterRender=false; self.postMessage({type:'ready'}); }
}
`;

/* ═══════════════════════════════════════════════════════════════════════
   MAIN THREAD
═══════════════════════════════════════════════════════════════════════ */
const canvas     = document.getElementById('out');
const initLayout = getLayout(window.innerWidth, window.innerHeight);
canvas.width     = window.innerWidth;
canvas.height    = window.innerHeight;

const offscreen = canvas.transferControlToOffscreen();
const worker    = new Worker(
  URL.createObjectURL(new Blob([WORKER_SRC], { type: 'application/javascript' }))
);

/* Worker → main: fade canvas back in once the first post-resize frame is drawn */
worker.addEventListener('message', e => {
  if (e.data.type === 'ready') canvas.style.opacity = '1';
});

worker.postMessage(
  { type: 'init', canvas: offscreen,
    width: window.innerWidth, height: window.innerHeight,
    cell: initLayout.cell, cols: initLayout.cols, rows: initLayout.rows },
  [offscreen]
);

function loadImage() {
  const { cols, rows } = getLayout(window.innerWidth, window.innerHeight);
  const iw   = Math.max(cols * 6, 400);
  const ih   = Math.max(rows * 6, 300);
  const seed = Math.floor(Math.random() * 1000);
  const img  = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => createImageBitmap(img).then(b => worker.postMessage({ type: 'image', bitmap: b }, [b]));
  img.src = `https://picsum.photos/seed/${seed}/${iw}/${ih}`;
}

loadImage();

let rafEvery=5, rafCount=0, calibFrames=0, calibStart=null;
(function rafLoop(ts) {
  requestAnimationFrame(rafLoop);
  if(calibFrames<=10){
    if(calibFrames===0) calibStart=ts;
    if(calibFrames===10){ rafEvery=Math.max(1,Math.round(FRAME_MS*10/(ts-calibStart))); rafCount=0; }
    calibFrames++;
  }
  if(++rafCount%rafEvery===0) worker.postMessage({type:'tick',ts});
})(0);

/* ── Resize — debounced ─────────────────────────────────────────────────
   During a window drag the browser auto-scales the canvas element via CSS
   (position:fixed; inset:0 always matches the viewport) so no worker
   message is needed until the drag settles.  After 300 ms of inactivity:
   fade canvas out → send resize → worker renders → sends 'ready' →
   fade back in.  User sees a smooth intentional crossfade, not a flash.  */
let resizeTimer = null;

window.addEventListener('resize', () => {
  canvas.style.opacity = '0'; // immediate — hides the CSS stretch during drag

  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const { cell, cols, rows } = getLayout(window.innerWidth, window.innerHeight);
    worker.postMessage({
      type: 'resize',
      width: window.innerWidth, height: window.innerHeight,
      cell, cols, rows
    });
  }, 300);
});

let dragging=false, lastSpawnX=0, lastSpawnY=0, lastClickTs=-Infinity;

window.addEventListener('pointerdown', e => {
  dragging=true; lastSpawnX=e.clientX; lastSpawnY=e.clientY;
  const now=performance.now();
  if(now-lastClickTs<CLICK_DELAY) return;
  lastClickTs=now;
  worker.postMessage({type:'ripple', x:e.clientX, y:e.clientY});
});

window.addEventListener('pointermove', e => {
  if(!dragging) return;
  const now=performance.now();
  if(now-lastClickTs<CLICK_DELAY) return;
  const dx=e.clientX-lastSpawnX, dy=e.clientY-lastSpawnY;
  if(dx*dx+dy*dy>=SPAWN_DIST2){
    lastClickTs=now; lastSpawnX=e.clientX; lastSpawnY=e.clientY;
    worker.postMessage({type:'ripple', x:e.clientX, y:e.clientY});
  }
});

window.addEventListener('pointerup',     ()=>{ dragging=false; });
window.addEventListener('pointercancel', ()=>{ dragging=false; });
window.addEventListener('keydown', e=>{ if(e.code==='Space') loadImage(); });
</script>

</body>
</html>
